<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ಲಾಗಿನ್</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Kannada:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Noto Sans Kannada',sans-serif;
background:linear-gradient(135deg,#0d47a1,#1976d2);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:white;
padding:35px;
border-radius:15px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#0d47a1;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#1976d2;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}
</style>

</head>
<body>

<div class="login-box">
<h2>ಬಳಕೆದಾರ ಲಾಗಿನ್</h2>

<input type="text" placeholder="ಬಳಕೆದಾರ ಹೆಸರು">

<input type="password" placeholder="ಗುಪ್ತಪದ">

<button>ಲಾಗಿನ್</button>

</div>

</body>
</html>
